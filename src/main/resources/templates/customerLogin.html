<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login — GoDrive</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">👤</div>
      <h2>Customer Login</h2>
      <p>Sign in to book GoDrive vehicles</p>
    </div>

    <div id="alert" class="alert alert-hidden"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Sign In</button>

    <div style="text-align:center; margin-top:20px; font-size:0.88rem; color:var(--muted);">
      Don't have an account?
      <a href="/customer-register" style="color:var(--primary); font-weight:600;">Register here</a>
    </div>

    <div style="text-align:center; margin-top:12px;">
      <a href="/" class="btn btn-outline btn-sm">← Back to Home</a>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    hideAlert();

    if (!email || !password) {
      showAlert('Please fill in all fields.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const data = await apiFetch('/api/customers/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });

      setSession({ ...data, role: 'CUSTOMER' });
      window.location.href = '/customer-dashboard';

    } catch(err) {
      showAlert(err.message || 'Login failed');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function showAlert(msg) {
    const el = document.getElementById('alert');
    el.className = 'alert alert-error';
    el.textContent = '⚠️ ' + msg;
  }

  function hideAlert() {
    document.getElementById('alert').className = 'alert alert-hidden';
  }
</script>
</body>
</html>
