<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoDrive</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; }
    .hero {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 20px;
    }
    .hero-title { font-size: 2.6rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
    .hero-title span { color: #f59e0b; }
    .hero-sub { color: #94a3b8; font-size: 1rem; margin-bottom: 48px; }

    .role-cards {
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px;
    }

    .role-card {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 36px 32px;
      cursor: pointer; transition: all .2s; width: 220px;
      color: #fff; text-decoration: none;
    }

    .role-card:hover {
      background: rgba(255,255,255,0.1);
      border-color: #f59e0b;
      transform: translateY(-4px);
    }

    .rc-icon { font-size: 2.8rem; margin-bottom: 14px; }
    .rc-title { font-size: 1.1rem; font-weight: 700; }
    .rc-desc  { font-size: 0.82rem; color: #94a3b8; margin-top: 6px; line-height: 1.5; }

    .new-user { color: #94a3b8; font-size: 0.88rem; }
    .new-user a { color: #60a5fa; font-weight: 600; }
    .new-user a:hover { color: #93c5fd; }
  </style>
</head>
<body>

<div class="hero">
  <div style="font-size:3.5rem; margin-bottom:16px;">🚗</div>

  <h1 class="hero-title">Go<span>Drive</span></h1>
  <p class="hero-sub">Book. Ride. Go.</p>

  <div class="role-cards">
    <a href="/admin-login" class="role-card">
      <div class="rc-icon">🛡️</div>
      <div class="rc-title">Admin</div>
      <div class="rc-desc">Manage vehicles and view all bookings</div>
    </a>

    <a href="/customer-login" class="role-card">
      <div class="rc-icon">👤</div>
      <div class="rc-title">Customer</div>
      <div class="rc-desc">Browse, book and manage your rides</div>
    </a>
  </div>

  <p class="new-user">
    New customer? <a href="/customer-register">Register here</a>
  </p>
</div>

</body>
</html>
