<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — GoDrive</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🛡️</div>
      <h2>Admin Login</h2>
      <p>Sign in to manage GoDrive</p>
    </div>

    <div id="alert" class="alert alert-error alert-hidden"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter admin email" autocomplete="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Login</button>

    <div style="text-align:center; margin-top:20px;">
      <a href="/" class="btn btn-outline btn-sm">← Back to Home</a>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    hideAlert();

    if (!email || !password) {
      showAlert('Please enter email and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const data = await apiFetch('/api/admin/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });

      setSession({
        role: 'ADMIN',
        email: data.email
      });

      window.location.href = '/admin-dashboard';

    } catch (err) {
      showAlert(err.message || 'Login failed');
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  }

  function showAlert(msg) {
    const el = document.getElementById('alert');
    el.textContent = '⚠️ ' + msg;
    el.classList.remove('alert-hidden');
  }

  function hideAlert() {
    const el = document.getElementById('alert');
    el.classList.add('alert-hidden');
    el.textContent = '';
  }
</script>
</body>
</html>
