<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — GoDrive</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">📝</div>
      <h2>Create Account</h2>
      <p>Register to start renting with GoDrive</p>
    </div>

    <div id="alert" class="alert alert-hidden"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="e.g. Arun Kumar" autocomplete="name">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 4 characters" autocomplete="new-password">
    </div>

    <button class="btn btn-primary btn-full" id="regBtn" onclick="doRegister()">Create Account</button>

    <div style="text-align:center; margin-top:20px; font-size:0.88rem; color:var(--muted);">
      Already have an account?
      <a href="/customer-login" style="color:var(--primary); font-weight:600;">Sign in here</a>
    </div>

    <div style="text-align:center; margin-top:12px;">
      <a href="/" class="btn btn-outline btn-sm">← Back to Home</a>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  async function doRegister() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('regBtn');

    hideAlert();

    if (!name || !email || !password) {
      showAlert('error', 'Please fill in all fields.');
      return;
    }

    if (password.length < 4) {
      showAlert('error', 'Password must be at least 4 characters.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      await apiFetch('/api/customers/register', {
        method: 'POST',
        body: JSON.stringify({ name, email, password })
      });

      showAlert('success', '✅ Account created! Redirecting to login…');

      setTimeout(() => {
        window.location.href = '/customer-login';
      }, 1500);

    } catch (err) {
      showAlert('error', err.message || 'Registration failed');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  function showAlert(type, msg) {
    const el = document.getElementById('alert');
    el.className = `alert alert-${type === 'error' ? 'error' : 'success'}`;
    el.textContent = msg;
  }

  function hideAlert() {
    document.getElementById('alert').className = 'alert alert-hidden';
  }
</script>
</body>
</html>
